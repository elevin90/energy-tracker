name: CI

on: 
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
      android: ${{ steps.filter.outputs.android }}
      backend: ${{ steps.filter.outputs.backend }}
      kmp: ${{ steps.filter.outputs.kmp }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: | 
            ios:
              - 'iOS/**'
            android:
              - 'Android/**'
            backend:
              - 'Backend/**'
            kmp:
              - 'kmp/**'

  ios:
    name: iOS Build
    needs: changes
    if: needs.changes.outputs.ios == 'true' || needs.changes.outputs.kmp == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build iOS
        run: |
          # Cleanup unavailable simulators to avoid conflicts
          xcrun simctl delete unavailable || true

          echo "=== Available runtimes ==="
          xcrun simctl list runtimes

          echo "=== Available device types ==="
          xcrun simctl list devicetypes

          # Get the latest available iOS runtime identifier (not version number!)
          IOS_RUNTIME=$(xcrun simctl list runtimes | grep "iOS" | grep -Eo "com.apple.CoreSimulator.SimRuntime.iOS-[0-9-]+" | tail -1)

          # Get the latest available watchOS runtime identifier
          WATCH_RUNTIME=$(xcrun simctl list runtimes | grep "watchOS" | grep -Eo "com.apple.CoreSimulator.SimRuntime.watchOS-[0-9-]+" | tail -1)

          echo "iOS runtime: $IOS_RUNTIME"
          echo "watchOS runtime: $WATCH_RUNTIME"

          # Use stable device types that are guaranteed to exist on CI runners
          PHONE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-15"
          WATCH_TYPE="com.apple.CoreSimulator.SimDeviceType.Apple-Watch-Series-9-45mm"

          # Create simulator devices
          PHONE_ID=$(xcrun simctl create "CI_iPhone" $PHONE_TYPE $IOS_RUNTIME)
          WATCH_ID=$(xcrun simctl create "CI_Watch" $WATCH_TYPE $WATCH_RUNTIME)

          echo "PHONE_ID=$PHONE_ID"
          echo "WATCH_ID=$WATCH_ID"

          # Validate that devices were created successfully
          if [ -z "$PHONE_ID" ] || [ -z "$WATCH_ID" ]; then
            echo "❌ Failed to create simulators"
            exit 1
          fi

          # Pair Apple Watch with iPhone (required for WatchKit apps)
          xcrun simctl pair $WATCH_ID $PHONE_ID

          # Boot iPhone first (required before booting paired watch)
          xcrun simctl boot $PHONE_ID

          # Boot watch (may fail silently if already booted, that's fine)
          xcrun simctl boot $WATCH_ID || true

          # Wait until iPhone simulator is fully booted
          xcrun simctl bootstatus $PHONE_ID -b

          # Debug: print all available devices
          xcrun simctl list devices

          # Build and run tests on the specific simulator
          cd iOS/Kaizen && \
          xcodebuild \
            -project Kaizen.xcodeproj \
            -scheme Kaizen \
            -destination "platform=iOS Simulator,id=$PHONE_ID" \
            -only-testing:KaizenTests \
            -skip-testing:KaizenUITests \
            -derivedDataPath build \
            test

  android:
    name: Android Build
    needs: changes
    if: needs.changes.outputs.android == 'true' || needs.changes.outputs.kmp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Android
        run: |
          cd android/Kaizen
          chmod +x gradlew
          ./gradlew build

  backend:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run backend tests
        run: |
          cd backend && swift test
