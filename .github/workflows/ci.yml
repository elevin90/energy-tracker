name: CI

on: 
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
      android: ${{ steps.filter.outputs.android }}
      backend: ${{ steps.filter.outputs.backend }}
      kmp: ${{ steps.filter.outputs.kmp }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: | 
            ios:
              - 'iOS/**'
            android:
              - 'Android/**'
            backend:
              - 'Backend/**'
            kmp:
              - 'kmp/**'
  ios:
    name: iOS Build
    needs: changes
    if: needs.changes.outputs.ios == 'true' || needs.changes.outputs.kmp == 'true'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: |
            iOS/Kaizen/build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-ios-${{ hashFiles('**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-ios-

      - name: Build iOS
        run: |
          set -e

          # Cleanup unavailable simulators
          xcrun simctl delete unavailable || true

          echo "=== Available runtimes ==="
          xcrun simctl list runtimes

          echo "=== Available device types ==="
          xcrun simctl list devicetypes

          TARGET_IOS="18"
          TARGET_WATCH="11"

          echo "====== Runtime device selection ======="

          IOS_RUNTIME=$(xcrun simctl list runtimes --json | jq -r ".runtimes[] | select(.name | startswith(\"iOS $TARGET_IOS\")) | .identifier" | sort -V | tail -n 1)
          WATCH_RUNTIME=$(xcrun simctl list runtimes --json | jq -r ".runtimes[] | select(.name | startswith(\"watchOS $TARGET_WATCH\")) | .identifier" | sort -V | tail -n 1)

          echo "Selected iOS runtime: $IOS_RUNTIME"
          echo "Selected watchOS runtime: $WATCH_RUNTIME"

          if [ -z "$IOS_RUNTIME" ] || [ -z "$WATCH_RUNTIME" ]; then
            echo "❌ Error: Could not find runtimes"
            exit 1
          fi

          PHONE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-15"
          WATCH_TYPE="com.apple.CoreSimulator.SimDeviceType.Apple-Watch-Series-9-45mm"

          # Create simulators
          PHONE_ID=$(xcrun simctl create "CI_iPhone" $PHONE_TYPE $IOS_RUNTIME)
          WATCH_ID=$(xcrun simctl create "CI_Watch" $WATCH_TYPE $WATCH_RUNTIME)

          echo "PHONE_ID=$PHONE_ID"
          echo "WATCH_ID=$WATCH_ID"

          if [ -z "$PHONE_ID" ] || [ -z "$WATCH_ID" ]; then
            echo "❌ Failed to create simulators"
            exit 1
          fi

          # Pair devices
          xcrun simctl pair $WATCH_ID $PHONE_ID

          # Boot devices
          xcrun simctl boot $PHONE_ID
          xcrun simctl boot $WATCH_ID || true

          # Wait until iPhone and Watch simulators are fully booted
          xcrun simctl bootstatus $PHONE_ID -b
          xcrun simctl bootstatus $WATCH_ID -b || true

          # Debug devices
          xcrun simctl list devices

          # Build & test
          cd iOS/Kaizen

          xcodebuild \
            -project Kaizen.xcodeproj \
            -scheme Kaizen \
            -destination "platform=iOS Simulator,id=$PHONE_ID" \
            -derivedDataPath build \
            build-for-testing

          xcodebuild \
            -project Kaizen.xcodeproj \
            -scheme Kaizen \
            -destination "platform=iOS Simulator,id=$PHONE_ID" \
            -parallel-testing-enabled YES \
            -enableCodeCoverage YES \
            -only-testing:KaizenTests \
            -skip-testing:KaizenUITests \
            -derivedDataPath build \
            test-without-building

          # Cleanup simulators
          xcrun simctl shutdown $PHONE_ID || true
          xcrun simctl shutdown $WATCH_ID || true
          xcrun simctl delete $PHONE_ID || true
          xcrun simctl delete $WATCH_ID || true


  android:
    name: Android Build
    needs: changes
    if: needs.changes.outputs.android == 'true' || needs.changes.outputs.kmp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Android
        run: |
          cd Android/Kaizen
          chmod +x gradlew
          ./gradlew build

  backend:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run backend tests
        run: |
          cd Backend && swift test
